name: Daily Sheet Update
on:
  schedule:
    - cron: '0 11 * * *'  # 6 AM EST (11 AM UTC)
  workflow_dispatch:  # Allows manual testing

jobs:
  update-sheets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependecies 
        run: echo "Using built-in fetch, no dependencies needed"
                
      - name: Update daily content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node update-sheets.js
        
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Daily Update Bot"
          git add *.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily content update - $(date '+%Y-%m-%d')"
            git push
          fi
